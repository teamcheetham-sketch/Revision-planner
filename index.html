<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Revision Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; background: #0A0A0F; }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  .nav-btn { background: transparent; border: 1px solid #2A2A35; color: #8A8A95; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'Space Mono', monospace; transition: all 0.2s; }
  .nav-btn:hover { border-color: #4A4A55; color: #E8E6E1; }
  .nav-btn.active { background: #1A1A25; border-color: #E63946; color: #E8E6E1; }
  .week-pill { padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Space Mono', monospace; transition: all 0.25s; border: 1px solid transparent; white-space: nowrap; background: #14141F; color: #6A6A75; }
  .week-pill:hover { background: #1E1E2A; color: #B0B0BA; }
  .week-pill.active { background: #1A1A25; border-color: #E63946; color: #E8E6E1; }
  .day-card { background: #12121A; border: 1px solid #1E1E2A; border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.25s; }
  .day-card:hover { border-color: #2A2A35; transform: translateY(-1px); }
  .day-card.expanded { border-color: #3A3A45; }
  .session-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; transition: all 0.2s; cursor: pointer; }
  .session-row:hover { background: #1A1A25; }
  .session-row.completed { opacity: 0.5; }
  .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #3A3A45; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; cursor: pointer; }
  .checkbox.checked { border-color: #2D6A4F; background: #2D6A4F; }
  .exam-badge { background: #E63946; color: white; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: 'Space Mono', monospace; letter-spacing: 1px; }
  .progress-bar { height: 3px; background: #1E1E2A; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .stat-card { background: #12121A; border: 1px solid #1E1E2A; border-radius: 12px; padding: 20px; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;


const EXAMS = [
  { date: "2026-06-02", time: "9:00 AM", subject: "Chemistry", paper: "Paper 1", code: "7405/1", duration: "2hr" },
  { date: "2026-06-03", time: "1:30 PM", subject: "Maths", paper: "Pure 1", code: "9MA0 01", duration: "2hr" },
  { date: "2026-06-04", time: "1:30 PM", subject: "Biology", paper: "Paper 1 – Biological Processes", code: "H420/01", duration: "2hr 15m" },
  { date: "2026-06-09", time: "9:00 AM", subject: "Chemistry", paper: "Paper 2", code: "7405/2", duration: "2hr" },
  { date: "2026-06-11", time: "1:30 PM", subject: "Maths", paper: "Pure 2", code: "9MA0 02", duration: "2hr" },
  { date: "2026-06-12", time: "9:00 AM", subject: "Biology", paper: "Paper 2 – Biological Diversity", code: "H420/02", duration: "2hr 15m" },
  { date: "2026-06-15", time: "9:00 AM", subject: "Chemistry", paper: "Paper 3", code: "7405/3", duration: "2hr" },
  { date: "2026-06-16", time: "9:00 AM", subject: "Biology", paper: "Paper 3 – Unified Biology", code: "H420/03", duration: "2hr" },
  { date: "2026-06-18", time: "1:30 PM", subject: "Maths", paper: "Stats & Mechanics", code: "9MA0 03", duration: "2hr" },
];

const SUBJECT_CONFIG = {
  Maths: { color: "#E63946", bg: "#FFF1F2", weight: 0.40, board: "Edexcel", icon: "∫" },
  Biology: { color: "#2D6A4F", bg: "#F0FFF4", weight: 0.30, board: "OCR A", icon: "🧬" },
  Chemistry: { color: "#1D3557", bg: "#F0F4FF", weight: 0.30, board: "AQA", icon: "⚗" },
};

const START_DATE = new Date("2026-03-17");

// School holidays (no school = full day available for revision)
// Easter: Sat 28 Mar – Sun 12 Apr (back Mon 13 Apr)
// May half term: Mon 25 May – Fri 29 May
function isSchoolHoliday(dateStr) {
  const d = new Date(dateStr);
  const easter = d >= new Date("2026-03-28") && d <= new Date("2026-04-12");
  const mayHalf = d >= new Date("2026-05-25") && d <= new Date("2026-05-29");
  return easter || mayHalf;
}

function isSchoolDay(dateStr, dayOfWeek) {
  if (dayOfWeek === 0 || dayOfWeek === 6) return false; // weekend
  if (isSchoolHoliday(dateStr)) return false;
  return true;
}

// Tutoring sessions
// Maths: Monday evening 1hr every week; from 14 Apr also Thursday evening 1hr
// Chemistry: Friday afternoon 1hr every week BUT NOT during school holidays
function getTutoringSessions(dateStr, dayOfWeek) {
  const sessions = [];
  const d = new Date(dateStr);
  const secondTutoringStarts = new Date("2026-04-14"); // ~4 weeks from now

  // Maths Monday tutoring (every week regardless of holidays)
  if (dayOfWeek === 1) {
    sessions.push({ type: "revision", subject: "Maths", label: "🎓 Maths tutoring session", slot: "evening", hours: 1, isTutoring: true });
  }

  // Maths Thursday tutoring (from 14 Apr, every week regardless of holidays)
  if (dayOfWeek === 4 && d >= secondTutoringStarts) {
    sessions.push({ type: "revision", subject: "Maths", label: "🎓 Maths tutoring session", slot: "evening", hours: 1, isTutoring: true });
  }

  // Chemistry Friday tutoring (every week EXCEPT school holidays)
  if (dayOfWeek === 5 && !isSchoolHoliday(dateStr)) {
    sessions.push({ type: "revision", subject: "Chemistry", label: "🎓 Chemistry tutoring session", slot: "afternoon", hours: 1, isTutoring: true });
  }

  return sessions;
}

// Generate 8 weeks of revision schedule
function generateSchedule() {
  const weeks = [];
  const totalWeeks = 11; // 17 Mar to 2 Jun (actually ~11 weeks, but we show 8 active + exam weeks)

  // Available slots
  // Weekdays: morning (7:00-8:20 = ~1.25hr) + evening (4:30-9:00 = ~4.5hr) = ~5.75hr
  // Weekends: full day (9:00-18:00 with breaks = ~7hr)

  for (let w = 0; w < 15; w++) {
    const weekStart = new Date(START_DATE);
    weekStart.setDate(weekStart.getDate() + w * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);

    const days = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(weekStart);
      date.setDate(date.getDate() + d);
      const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      const dayOfWeek = date.getDay();
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

      // Check for exams on this day
      const dayExams = EXAMS.filter(e => e.date === dateStr);

      // Phase-based intensity
      const weeksToExam = Math.max(0, Math.floor((new Date("2026-06-02") - date) / (7 * 24 * 60 * 60 * 1000)));
      let intensity = "normal";
      if (weeksToExam <= 1) intensity = "exam-week";
      else if (weeksToExam <= 3) intensity = "intense";
      else if (weeksToExam <= 6) intensity = "building";

      // Generate sessions
      const sessions = [];
      if (dayExams.length > 0) {
        const isMorningExam = dayExams.some(e => e.time.includes("9:00"));
        const isAfternoonExam = dayExams.some(e => e.time.includes("1:30"));
        
        // If afternoon exam, light morning revision for THAT exam
        if (isAfternoonExam && !isMorningExam) {
          const afternoonExam = dayExams.find(e => e.time.includes("1:30"));
          sessions.push({ type: "revision", subject: afternoonExam.subject, label: `Light review before exam: ${afternoonExam.paper}`, slot: "morning", hours: 1.5 });
        }
        
        // Add exam entries
        dayExams.forEach(exam => {
          sessions.push({ type: "exam", subject: exam.subject, label: `EXAM: ${exam.paper}`, time: exam.time, duration: exam.duration });
        });
        
        // If morning exam, light evening revision for next upcoming exam
        if (isMorningExam) {
          const nextExam = EXAMS.find(e => e.date > dateStr);
          if (nextExam) {
            sessions.push({ type: "revision", subject: nextExam.subject, label: `Evening review: ${nextExam.paper}`, slot: "evening", hours: 2 });
          }
        }
      } else if (date < new Date("2026-06-02") || (date >= new Date("2026-06-02") && date <= new Date("2026-06-18"))) {
        // Between exams or pre-exam period
        const examDates = EXAMS.map(e => new Date(e.date));
        const isExamPeriod = date >= new Date("2026-06-02");

        if (isExamPeriod) {
          // During exam period - focus on upcoming exams with SPECIFIC content
          // Map each paper to the topics students should revise for it
          const paperTopics = {
            // Chemistry Paper 1 (2 Jun): Physical (1.1-1.4, 1.6-1.8, 1.10-1.12) + ALL Inorganic
            "Paper 1": ["Phys: Atomic structure, Amount of substance, Bonding, Energetics", "Phys: Equilibria, Redox, Thermodynamics, Kp, Electrode potentials, Acids & bases", "Inorganic: Periodicity, Group 2, Halogens, Period 3, Transition metals, Ions in solution"],
            // Maths Pure 1 (3 Jun): Any Pure content
            "Pure 1": ["Proof, Algebra & Functions, Coordinate Geometry", "Sequences & Series, Trigonometry, Exponentials & Logs", "Differentiation, Integration, Numerical Methods, Vectors"],
            // Biology Paper 1 (4 Jun): Modules 1, 2, 3, 5
            "Paper 1 – Biological Processes": ["Mod 2: Cell structure, Biological molecules, Enzymes, Membranes", "Mod 3: Exchange surfaces, Transport in animals & plants", "Mod 5: Neuronal & hormonal communication, Homeostasis, Photosynthesis, Respiration"],
            // Chemistry Paper 2 (9 Jun): Physical (1.2-1.6, 1.9) + ALL Organic
            "Paper 2": ["Phys: Amount of substance, Bonding, Energetics, Kinetics, Equilibria, Rate equations", "Organic: Alkanes through to Aromatic chemistry", "Organic: Amines, Polymers, Amino acids/DNA, Synthesis, NMR, Chromatography"],
            // Maths Pure 2 (11 Jun): Any Pure content
            "Pure 2": ["Focus on weaker Pure topics from Pure 1 feedback", "Differentiation & Integration (advanced)", "Proof, Numerical Methods, Vectors"],
            // Biology Paper 2 (12 Jun): Modules 1, 2, 4, 6
            "Paper 2 – Biological Diversity": ["Mod 2: Foundations (also in Paper 1 but still testable)", "Mod 4: Communicable diseases, Biodiversity, Classification & evolution", "Mod 6: Cellular control, Inheritance, Genomes, Cloning, Ecosystems, Populations"],
            // Chemistry Paper 3 (15 Jun): Any content (synoptic)
            "Paper 3": ["Synoptic: links across Physical, Organic & Inorganic", "Practical techniques & analysis", "Extended response practice"],
            // Biology Paper 3 (16 Jun): Modules 1-6 (unified/synoptic)
            "Paper 3 – Unified Biology": ["Synoptic: links across all modules", "Practical skills & experimental design", "Extended response across specification"],
            // Maths Stats & Mechanics (18 Jun): Stats + Mechanics
            "Stats & Mechanics": ["Stats: Sampling, Data, Probability, Distributions, Hypothesis testing", "Mech: Quantities & Units, Kinematics, Forces, Moments", "Large data set familiarity"],
          };

          const upcoming = EXAMS.filter(e => new Date(e.date) > date).slice(0, 2);
          if (isWeekend) {
            upcoming.forEach((exam, i) => {
              const topics = paperTopics[exam.paper] || [`Revise: ${exam.paper}`];
              const topicIdx = (d + i) % topics.length;
              sessions.push({ type: "revision", subject: exam.subject, label: `${exam.paper}: ${topics[topicIdx]}`, slot: i === 0 ? "morning" : "afternoon", hours: 3 });
            });
          } else {
            if (upcoming[0]) {
              const topics0 = paperTopics[upcoming[0].paper] || [`Revise: ${upcoming[0].paper}`];
              sessions.push({ type: "revision", subject: upcoming[0].subject, label: `${upcoming[0].paper}: ${topics0[0]}`, slot: "morning", hours: 1 });
              sessions.push({ type: "revision", subject: upcoming[0].subject, label: `${upcoming[0].paper}: ${topics0[1] || topics0[0]}`, slot: "evening", hours: 2.5 });
            }
            if (upcoming[1]) {
              const topics1 = paperTopics[upcoming[1].paper] || [`Revise: ${upcoming[1].paper}`];
              sessions.push({ type: "revision", subject: upcoming[1].subject, label: `${upcoming[1].paper}: ${topics1[0]}`, slot: "evening", hours: 1.5 });
            }
          }
        } else {
          // Pre-exam revision period
          const mW = 0.40, bW = 0.30, cW = 0.30;

          // Past paper frequency & duration
          // Total target: ~36hrs across 9 weeks
          // W1-3 (Foundation): 1×1hr/week = 3hr (question familiarity, not full papers)
          // W4-6 (Building): 1 full timed paper/week on weekends = ~6.5hr 
          // W7-9 (Intensive): 3 full timed papers/week (2 weekday evenings + 1 weekend) = ~19.5hr
          // Remaining ~7hr covered by slightly longer weekend PP sessions in intensive
          
          // Paper durations by subject for full timed practice
          const fullPaperDuration = { Maths: 2, Biology: 2.25, Chemistry: 2 };

          // Past paper subject rotation
          const ppSubjects = ["Maths", "Biology", "Chemistry"];
          const ppSubjectIdx = (w * 7 + d) % 3;
          const ppSubject = ppSubjects[ppSubjectIdx];
          
          let ppDuration, isPastPaperDay;
          if (w < 3) {
            // Foundation: 1hr intro sessions on Fridays only
            ppDuration = 1;
            isPastPaperDay = dayOfWeek === 5; // Friday
          } else if (w < 6) {
            // Building: 1 full timed paper per week on Saturday
            isPastPaperDay = dayOfWeek === 6; // Saturday
            ppDuration = fullPaperDuration[ppSubject];
          } else {
            // Intensive: 3 full timed papers per week (Wed evening, Fri evening, Sat morning)
            isPastPaperDay = [3, 5, 6].includes(dayOfWeek); // Wed, Fri, Sat
            ppDuration = fullPaperDuration[ppSubject];
          }

          // Special case: today (17 Mar) = evening only
          const isToday = dateStr === "2026-03-17";
          const isHoliday = isSchoolHoliday(dateStr);
          const isFullDay = isWeekend || isHoliday; // Full day available
          const tutoring = getTutoringSessions(dateStr, dayOfWeek);
          const tutoringHours = tutoring.reduce((sum, t) => sum + t.hours, 0);

          if (isToday) {
            // First day - light start: 1.5 hours
            sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, `D${d}`), slot: "evening", hours: 1 });
            sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, `D${d}`), slot: "evening", hours: 0.5 });
          } else if (dateStr === "2026-03-18" || dateStr === "2026-03-19") {
            // Compensation days: +1hr each to make up for light Day 1
            tutoring.forEach(t => sessions.push(t));
            const eveningHrs = 4.5 - tutoringHours + 1; // extra hour
            const dayNum = (w * 5 + dayOfWeek) % 3;
            if (dateStr === "2026-03-18") {
              // Wed: extra Chemistry + Biology to compensate
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, `E${d}`), slot: "morning", hours: 1 });
              sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, `F${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.40 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, `F${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.30 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, `F${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.30 * 10) / 10 });
            } else {
              // Thu: extra Maths to compensate
              sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, `D${d}`), slot: "morning", hours: 1 });
              sessions.push({ type: "revision", subject: "Maths", label: "Practice problems", slot: "evening", hours: Math.round(eveningHrs * 0.38 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, `D${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.31 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, `D${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.31 * 10) / 10 });
            }
          } else if (isFullDay) {
            // Full day: ~7 hours (weekend or school holiday)
            const totalHrs = 7 - tutoringHours;
            // Add tutoring first
            tutoring.forEach(t => sessions.push(t));

            if (isPastPaperDay) {
              const ppLabel = w < 3 
                ? `📝 Past paper intro: ${ppSubject}` 
                : `📝 Full timed paper: ${ppSubject} (${ppDuration}hr)`;
              sessions.push({ type: "revision", subject: ppSubject, label: ppLabel, slot: "morning", hours: ppDuration, isPastPaper: true });
              const remaining = totalHrs - ppDuration;
              if (remaining > 0) {
                sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, "AM"), slot: "afternoon", hours: Math.round(remaining * mW * 10) / 10 });
                sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, "PM"), slot: "afternoon", hours: Math.round(remaining * bW * 10) / 10 });
                sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, "PM"), slot: "evening", hours: Math.round(remaining * cW * 10) / 10 });
              }
            } else {
              sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, dayOfWeek === 6 ? "AM" : "AM2"), slot: "morning", hours: Math.round(totalHrs * mW * 10) / 10 });
              sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, dayOfWeek === 6 ? "PM" : "AM2"), slot: "afternoon", hours: Math.round(totalHrs * bW * 10) / 10 });
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, dayOfWeek === 6 ? "PM" : "AM2"), slot: "evening", hours: Math.round(totalHrs * cW * 10) / 10 });
            }
          } else {
            // School weekday: morning (~1hr) + evening (~4.5hr)
            // Subtract tutoring hours from evening availability
            const eveningHrs = 4.5 - tutoringHours;
            const dayNum = (w * 5 + dayOfWeek) % 3;

            // Add tutoring first
            tutoring.forEach(t => sessions.push(t));

            if (isPastPaperDay) {
              const otherSubjects = ppSubjects.filter(s => s !== ppSubject);
              const ppLabel = w < 3 
                ? `📝 Past paper intro: ${ppSubject}` 
                : `📝 Full timed paper: ${ppSubject} (${ppDuration}hr)`;
              // Helper to get correct topic for a given subject
              const topicFor = (subj, seed) => {
                if (subj === "Maths") return getMathsTopic(w, seed);
                if (subj === "Biology") return getBioTopic(w, seed);
                return getChemTopic(w, seed);
              };
              sessions.push({ type: "revision", subject: otherSubjects[0], label: topicFor(otherSubjects[0], `D${d}`), slot: "morning", hours: 1 });
              sessions.push({ type: "revision", subject: ppSubject, label: ppLabel, slot: "evening", hours: ppDuration, isPastPaper: true });
              const remainingEvening = eveningHrs - ppDuration;
              if (remainingEvening > 0) {
                const half = Math.round(remainingEvening / 2 * 10) / 10;
                sessions.push({ type: "revision", subject: otherSubjects[0], label: topicFor(otherSubjects[0], `E${d}`), slot: "evening", hours: half });
                sessions.push({ type: "revision", subject: otherSubjects[1], label: topicFor(otherSubjects[1], `F${d}`), slot: "evening", hours: remainingEvening - half });
              }
            } else if (dayNum === 0) {
              // Maths-heavy day
              sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, `D${d}`), slot: "morning", hours: 1 });
              sessions.push({ type: "revision", subject: "Maths", label: "Practice problems", slot: "evening", hours: Math.round(eveningHrs * 0.38 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, `D${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.31 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, `D${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.31 * 10) / 10 });
            } else if (dayNum === 1) {
              // Biology-heavy day
              sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, `E${d}`), slot: "morning", hours: 1 });
              sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, `E${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.45 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, `D${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.27 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, `D${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.28 * 10) / 10 });
            } else {
              // Chemistry-heavy day
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, `E${d}`), slot: "morning", hours: 1 });
              sessions.push({ type: "revision", subject: "Maths", label: getMathsTopic(w, `F${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.45 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Chemistry", label: getChemTopic(w, `F${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.27 * 10) / 10 });
              sessions.push({ type: "revision", subject: "Biology", label: getBioTopic(w, `F${d}`), slot: "evening", hours: Math.round(eveningHrs * 0.28 * 10) / 10 });
            }
          }
        }
      }

      days.push({
        date,
        dateStr,
        dayOfWeek,
        isWeekend,
        intensity,
        sessions,
        exams: dayExams,
        completed: false,
      });
    }

    if (weekStart <= new Date("2026-06-18")) {
      weeks.push({ weekNum: w + 1, start: weekStart, end: weekEnd, days, phase: getPhase(w) });
    }
  }
  return weeks.slice(0, 15);
}

function getPhase(week) {
  if (week < 3) return "Foundation";
  if (week < 6) return "Building";
  if (week < 11) return "Intensive";
  return "Exam Period";
}

function getMathsTopic(week, slot) {
  const topics = [
    // Pure (Papers 1 & 2)
    "Pure: Proof", "Pure: Algebra & Functions", "Pure: Coordinate Geometry",

function formatDate(date) {
  return date.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

function formatDay(date) {
  return date.toLocaleDateString("en-GB", { weekday: "short" });
}

function daysUntil(dateStr) {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const target = new Date(dateStr);
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
}

function RevisionPlanner() {
  const [selectedWeek, setSelectedWeek] = useState(0);
  const [completedSessions, setCompletedSessions] = useState({});
  const [view, setView] = useState("today"); // today, schedule, overview, exams
  const [expandedDay, setExpandedDay] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const hasUserChanged = useRef(false);

  const schedule = useRef(generateSchedule()).current;
  const now = new Date();
  const TODAY = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

  // Load saved progress on mount
  useEffect(() => {
    try {
      const saved = localStorage.getItem("revplan");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && Object.keys(parsed).length > 0) {
          setCompletedSessions(parsed);
          setSaveStatus(`✓ ${Object.values(parsed).filter(Boolean).length} loaded`);
        }
      }
    } catch (e) {
      // No saved data yet
    }
    setLoaded(true);
  }, []);

  // Save progress only when user has actually toggled something
  useEffect(() => {
    if (!loaded || !hasUserChanged.current) return;
    try {
      localStorage.setItem("revplan", JSON.stringify(completedSessions));
      const count = Object.values(completedSessions).filter(Boolean).length;
      setSaveStatus(`✓ ${count} saved`);
    } catch (e) {
      setSaveStatus("⚠ save failed");
    }
  }, [completedSessions, loaded]);

  const toggleSession = (weekIdx, dayIdx, sessionIdx) => {
    hasUserChanged.current = true;
    const key = `${weekIdx}-${dayIdx}-${sessionIdx}`;
    setCompletedSessions(prev => ({ ...prev, [key]: !prev[key] }));
  };

  // Find today in schedule
  const findToday = () => {
    for (let wi = 0; wi < schedule.length; wi++) {
      for (let di = 0; di < schedule[wi].days.length; di++) {
        if (schedule[wi].days[di].dateStr === TODAY) {
          return { weekIdx: wi, dayIdx: di, day: schedule[wi].days[di] };
        }
      }
    }
    return null;
  };

  const todayData = findToday();

  // Get missed sessions from previous days (not completed, not exam type)
  const getMissedSessions = () => {
    const missed = [];
    for (let wi = 0; wi < schedule.length; wi++) {
      for (let di = 0; di < schedule[wi].days.length; di++) {
        const day = schedule[wi].days[di];
        if (day.dateStr >= TODAY) break;
        day.sessions.forEach((s, si) => {
          if (s.type === "revision" && !completedSessions[`${wi}-${di}-${si}`]) {
            missed.push({ ...s, origWeek: wi, origDay: di, origSession: si, origDate: day.dateStr });
          }
        });
      }
    }
    return missed;
  };

  // Catch-up blocks: 5hrs/week on Thu(1.25), Fri(1.25), Sat(1.25), Sun(1.25)
  // These are populated with missed sessions
  const getCatchUpForDay = (dateStr, dayOfWeek) => {
    if (![4, 5, 6, 0].includes(dayOfWeek)) return []; // Thu, Fri, Sat, Sun only
    const missed = getMissedSessions();
    if (missed.length === 0) return [];

    // Each catch-up day gets 1.25hrs, fill with missed sessions in order
    const catchUpSlots = [];
    let remainingHrs = 1.25;
    
    // Figure out which catch-up day index this is in the current week
    const catchUpDayOrder = { 4: 0, 5: 1, 6: 2, 0: 3 }; // Thu=0, Fri=1, Sat=2, Sun=3
    const dayOrder = catchUpDayOrder[dayOfWeek];
    
    // Distribute missed sessions across the 4 catch-up days
    // This day gets every 4th missed session starting from its index
    for (let i = dayOrder; i < missed.length && remainingHrs > 0; i += 4) {
      const m = missed[i];
      const hrs = Math.min(m.hours || 1, remainingHrs);
      catchUpSlots.push({
        type: "revision",
        subject: m.subject,
        label: `🔄 Catch-up: ${m.label}`,
        slot: "catch-up",
        hours: hrs,
        isCatchUp: true,
        origKey: `${m.origWeek}-${m.origDay}-${m.origSession}`,
      });
      remainingHrs -= hrs;
    }
    return catchUpSlots;
  };

  // Today's stats
  const getTodayStats = () => {
    if (!todayData) return { total: 0, completed: 0, remaining: 0, topics: [], totalHrs: 0, completedHrs: 0 };
    const { weekIdx, dayIdx, day } = todayData;
    const revSessions = day.sessions.filter(s => s.type === "revision");
    const completed = revSessions.filter((s, si) => {
      const actualIdx = day.sessions.indexOf(s);
      return completedSessions[`${weekIdx}-${dayIdx}-${actualIdx}`];
    });
    const totalHrs = revSessions.reduce((sum, s) => sum + (s.hours || 0), 0);
    const completedHrs = completed.reduce((sum, s) => sum + (s.hours || 0), 0);
    const topics = [...new Set(revSessions.map(s => s.label))];
    return {
      total: revSessions.length,
      completed: completed.length,
      remaining: revSessions.length - completed.length,
      pct: revSessions.length > 0 ? Math.round((completed.length / revSessions.length) * 100) : 0,
      totalHrs,
      completedHrs,
      remainingHrs: totalHrs - completedHrs,
      topics,
    };
  };

  const getWeekProgress = (weekIdx) => {
    const week = schedule[weekIdx];
    if (!week) return 0;
    let total = 0, done = 0;
    week.days.forEach((day, di) => {
      day.sessions.forEach((s, si) => {
        if (s.type === "revision") {
          total++;
          if (completedSessions[`${weekIdx}-${di}-${si}`]) done++;
        }
      });
    });
    return total === 0 ? 0 : Math.round((done / total) * 100);
  };

  const getTotalHours = (subject) => {
    let total = 0;
    schedule.forEach(week => {
      week.days.forEach(day => {
        day.sessions.forEach(s => {
          if (s.type === "revision" && s.subject === subject) total += (s.hours || 0);
        });
      });
    });
    return Math.round(total);
  };

  const getWeekHours = (weekIdx, subject) => {
    let total = 0;
    const week = schedule[weekIdx];
    if (!week) return 0;
    week.days.forEach(day => {
      day.sessions.forEach(s => {
        if (s.type === "revision" && (!subject || s.subject === subject)) total += (s.hours || 0);
      });
    });
    return Math.round(total * 10) / 10;
  };

  const missedCount = getMissedSessions().length;

          <p style={{ color: "#6A6A75", fontSize: 12, marginTop: 8 }}>Retrieving saved sessions</p>
        </div>
      </div>
    );
  }

  const completedCount = Object.values(completedSessions).filter(Boolean).length;

  return (
    <div style={{

      background: "#0A0A0F",
      color: "#E8E6E1",
      fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif",
      overflowX: "hidden",
      overflowY: "auto",
      WebkitOverflowScrolling: "touch",
    }}>
      {/* Header */}
      <div style={{ padding: "16px 16px 0", borderBottom: "1px solid #1A1A25" }}>
        <div style={{ marginBottom: 12 }}>
          <h1 style={{ fontFamily: "'Space Mono', monospace", fontSize: 18, fontWeight: 700, letterSpacing: "-0.5px", marginBottom: 4 }}>
              REVISION PLANNER
          </h1>
          <p style={{ color: "#6A6A75", fontSize: 12, fontFamily: "'Space Mono', monospace" }}>
            {daysUntil("2026-06-02")} days to first exam
            {saveStatus && (
              <span style={{ color: saveStatus.includes("⚠") ? "#E63946" : "#2D6A4F", marginLeft: 12, fontSize: 11 }}>
                {saveStatus}
              </span>
            )}
          </p>
        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 12, overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
          {["today", "schedule", "overview", "exams"].map(v => (
            <button key={v} className={`nav-btn ${view === v ? "active" : ""}`} onClick={() => setView(v)}
              style={{ whiteSpace: "nowrap", minWidth: "fit-content" }}>
              {v.charAt(0).toUpperCase() + v.slice(1)}
            </button>
          ))}
        </div>

        {/* Subject legend */}
        <div style={{ display: "flex", gap: 10, paddingBottom: 12, flexWrap: "wrap" }}>
          {Object.entries(SUBJECT_CONFIG).map(([name, cfg]) => (
            <div key={name} style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: cfg.color }} />
              <span style={{ fontSize: 11, color: "#8A8A95", fontFamily: "'Space Mono', monospace" }}>
                {name} ({Math.round(cfg.weight * 100)}%)
              </span>
            </div>
          ))}
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontSize: 10 }}>📝</span>
            <span style={{ fontSize: 11, color: "#8A8A95", fontFamily: "'Space Mono', monospace" }}>Past paper</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontSize: 10 }}>🎓</span>
            <span style={{ fontSize: 11, color: "#8A8A95", fontFamily: "'Space Mono', monospace" }}>Tutoring</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontSize: 10 }}>🔄</span>
            <span style={{ fontSize: 11, color: "#8A8A95", fontFamily: "'Space Mono', monospace" }}>Catch-up</span>
          </div>

      {view === "today" && todayData && (() => {

                <p style={{ fontSize: 10, color: "#6A6A75" }}>Complete</p>

                })}

            </div>

            {/* Today's topics */}
            <div className="stat-card" style={{ marginBottom: 20 }}>

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>

                  return (

                        <p style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Space Mono', monospace" }}>{day.date.getDate()}</p>
                      </div>
                      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
                        {hasExam && <span className="exam-badge">EXAM</span>}
                        {day.sessions.filter(s => s.type === "revision").map((s, i) => (
                          <span key={i} style={{
                            display: "inline-block", width: 8, height: 8, borderRadius: "50%",
                            background: SUBJECT_CONFIG[s.subject]?.color || "#666",
                          }} />
                        ))}
                        {showCatchUpLabel && (
                          <span style={{
                            fontSize: 9, color: showCatchUpContent ? "#F59E0B" : "#3A3A45",
                            fontFamily: "'Space Mono', monospace", padding: "2px 6px",
                            border: `1px ${showCatchUpContent ? "solid" : "dashed"} ${showCatchUpContent ? "#F59E0B" : "#2A2A35"}`,
                            borderRadius: 4, marginLeft: 4,
                          }}>
                            {showCatchUpContent ? `🔄 ${catchUp.length} catch-up` : "🔄 catch-up slot"}
                          </span>
                        )}
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {day.sessions.filter(s => s.type === "revision").length > 0 && (
                        <span style={{ fontSize: 11, color: "#6A6A75", fontFamily: "'Space Mono', monospace" }}>
                          {day.sessions.filter((s, si) => s.type === "revision" && completedSessions[`${selectedWeek}-${di}-${si}`]).length}/{day.sessions.filter(s => s.type === "revision").length}
                        </span>
                      )}
                      <span style={{ fontSize: 14, color: "#4A4A55", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
                    </div>
                  </div>

                  {isExpanded && (
                    <div className="fade-in" style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 2 }}>
                      {day.sessions.length === 0 ? (
                        <p style={{ color: "#4A4A55", fontSize: 13, padding: "8px 12px" }}>Rest day</p>
                      ) : (
                        day.sessions.map((session, si) => {
                          const isCompleted = completedSessions[`${selectedWeek}-${di}-${si}`];
                          const cfg = SUBJECT_CONFIG[session.subject] || {};

                          return (
                            <div
                              key={si}
                              className={`session-row ${isCompleted ? "completed" : ""}`}
                              onClick={(e) => { e.stopPropagation(); if (session.type === "revision") toggleSession(selectedWeek, di, si); }}
                            >
                              {session.type === "revision" ? (
                                <div className={`checkbox ${isCompleted ? "checked" : ""}`}>
                                  {isCompleted && <span style={{ color: "white", fontSize: 12 }}>✓</span>}
                                </div>
                              ) : (
                                <span className="exam-badge" style={{ fontSize: 9 }}>EXAM</span>
                              )}
                              <div style={{ width: 4, height: 28, borderRadius: 2, background: cfg.color || "#E63946", flexShrink: 0 }} />
                              <div style={{ flex: 1 }}>
                                <p style={{ fontSize: 13, fontWeight: 500, textDecoration: isCompleted ? "line-through" : "none" }}>
                                  {session.label}
                                </p>
                                <p style={{ fontSize: 11, color: "#6A6A75" }}>
                                  {session.subject} · {session.slot || session.time}{session.hours ? ` · ${session.hours}hr` : ""}
                                </p>
                              </div>
                            </div>
                          );
                        })
                      )}
                      {/* Catch-up blocks */}
                      {(() => {
                        if (!showCatchUpLabel) return null;
                        const catchUpItems = getCatchUpForDay(day.dateStr, day.dayOfWeek);
                        
                        if (catchUpItems.length === 0) {
                          // Empty placeholder - no missed sessions
                          return (
                            <div style={{ marginTop: 8, borderTop: "1px dashed #2A2A35", paddingTop: 8 }}>
                              <p style={{ fontSize: 10, color: "#3A3A45", fontFamily: "'Space Mono', monospace", padding: "4px 12px" }}>
                                🔄 CATCH-UP SLOT (1.25hr) — nothing to catch up on yet
                              </p>
                            </div>
                          );
                        }
                        
                        return (
                          <div style={{ marginTop: 8, borderTop: "1px dashed #F59E0B", paddingTop: 8 }}>
                            <p style={{ fontSize: 10, color: "#F59E0B", fontFamily: "'Space Mono', monospace", marginBottom: 6, padding: "0 12px" }}>
                              🔄 CATCH-UP BLOCK (1.25hr) — missed sessions to complete
                            </p>
                            {catchUpItems.map((cu, ci) => {
                              const origCompleted = completedSessions[cu.origKey];
                              return (
                                <div
                                  key={`cu-${ci}`}
                                  className={`session-row ${origCompleted ? "completed" : ""}`}
                                  onClick={(e) => {
                                    e.stopPropagation();
                                    if (cu.origKey) {
                                      hasUserChanged.current = true;
                                      setCompletedSessions(prev => ({ ...prev, [cu.origKey]: !prev[cu.origKey] }));
                                    }
                                  }}
                                  style={{ opacity: origCompleted ? 0.4 : 0.8 }}
                                >
                                  <div className={`checkbox ${origCompleted ? "checked" : ""}`} style={{ borderColor: "#F59E0B" }}>
                                    {origCompleted && <span style={{ color: "white", fontSize: 12 }}>✓</span>}
                                  </div>
                                  <div style={{ width: 4, height: 28, borderRadius: 2, background: "#F59E0B", flexShrink: 0 }} />
                                  <div style={{ flex: 1 }}>
                                    <p style={{ fontSize: 13, fontWeight: 500, textDecoration: origCompleted ? "line-through" : "none", color: "#F59E0B" }}>
                                      {cu.label}
                                    </p>
                                    <p style={{ fontSize: 11, color: "#6A6A75" }}>
                                      {cu.subject} · catch-up · {cu.hours}hr
                                    </p>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view === "overview" && (
        <div className="fade-in" style={{ padding: 16 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16, fontFamily: "'Space Mono', monospace" }}>Overview</h2>

          {/* Total hours by subject */}
          <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
            {Object.entries(SUBJECT_CONFIG).map(([name, cfg]) => (
              <div key={name} className="stat-card" style={{ flex: "1 1 80px", minWidth: 80, textAlign: "center", padding: 12 }}>
                <span style={{ fontSize: 24 }}>{cfg.icon}</span>
                <p style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Space Mono', monospace", color: cfg.color, marginTop: 4 }}>
                  {getTotalHours(name)}h
                </p>
                <p style={{ fontSize: 10, color: "#6A6A75", fontFamily: "'Space Mono', monospace" }}>{name}</p>
                <p style={{ fontSize: 9, color: "#4A4A55", marginTop: 2 }}>{cfg.board}</p>
              </div>
            ))}
          </div>

          {/* Weekly breakdown chart */}
          <div className="stat-card" style={{ marginBottom: 16, overflow: "hidden", padding: 12 }}>
            <p style={{ fontSize: 12, fontWeight: 500, marginBottom: 12 }}>Weekly Hours Distribution</p>
            <div style={{ display: "flex", gap: 2, alignItems: "flex-end", height: 120, padding: "0 2px" }}>
              {(() => {
                const weekTotals = schedule.map((_, i) => {
                  const mH = getWeekHours(i, "Maths");
                  const bH = getWeekHours(i, "Biology");
                  const cH = getWeekHours(i, "Chemistry");
                  return { mH, bH, cH, total: mH + bH + cH };
                });
                const actualMax = Math.max(...weekTotals.map(w => w.total), 1);
                const barMaxHeight = 90;

                return weekTotals.map((wt, i) => {
                  const scale = barMaxHeight / actualMax;
                  return (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 0 }}>
                      <span style={{ fontSize: 7, color: "#6A6A75", fontFamily: "'Space Mono', monospace" }}>
                        {wt.total > 0 ? Math.round(wt.total) : ""}
                      </span>
                      <div style={{ display: "flex", flexDirection: "column", width: "100%", gap: 1 }}>
                        <div style={{ height: Math.max(wt.mH * scale, wt.mH > 0 ? 2 : 0), background: SUBJECT_CONFIG.Maths.color, borderRadius: "2px 2px 0 0", transition: "height 0.3s" }} />
                        <div style={{ height: Math.max(wt.bH * scale, wt.bH > 0 ? 2 : 0), background: SUBJECT_CONFIG.Biology.color, transition: "height 0.3s" }} />
                        <div style={{ height: Math.max(wt.cH * scale, wt.cH > 0 ? 2 : 0), background: SUBJECT_CONFIG.Chemistry.color, borderRadius: "0 0 2px 2px", transition: "height 0.3s" }} />
                      </div>
                      <span style={{ fontSize: 7, color: "#6A6A75", fontFamily: "'Space Mono', monospace" }}>{i + 1}</span>
                    </div>
                  );
                });
              })()}
            </div>
          </div>

          {/* Phase breakdown */}
          <div className="stat-card">
            <p style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>Revision Phases</p>
            {[
              { name: "Foundation", weeks: "W1–W3", desc: "Build core knowledge, fill gaps · 1× past paper intro/week (1hr)", color: "#3B82F6" },
              { name: "Building", weeks: "W4–W6", desc: "Deepen understanding, connect topics · 1× full timed paper/week", color: "#F59E0B" },
              { name: "Intensive", weeks: "W7–W11", desc: "Timed practice, weak topic blitz · 3× full timed papers/week", color: "#EF4444" },
              { name: "Exam Period", weeks: "W12–W14", desc: "Final revision between exams, paper-specific content only", color: "#8B5CF6" },
            ].map((phase, i) => (
              <div key={i} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 0", borderBottom: i < 3 ? "1px solid #1E1E2A" : "none" }}>
                <div style={{ width: 4, height: 32, borderRadius: 2, background: phase.color }} />
                <div>
                  <p style={{ fontSize: 13, fontWeight: 500 }}>{phase.name} <span style={{ color: "#6A6A75", fontSize: 11 }}>({phase.weeks})</span></p>
                  <p style={{ fontSize: 11, color: "#6A6A75" }}>{phase.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {view === "exams" && (
        <div className="fade-in" style={{ padding: 16 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 20, fontFamily: "'Space Mono', monospace" }}>Exam Schedule</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {EXAMS.map((exam, i) => {
              const cfg = SUBJECT_CONFIG[exam.subject];
              const days = daysUntil(exam.date);
              return (
                <div key={i} className="stat-card" style={{ display: "flex", alignItems: "center", gap: 16, borderLeft: `3px solid ${cfg.color}` }}>
                  <div style={{ textAlign: "center", minWidth: 50 }}>
                    <p style={{ fontSize: 24, fontWeight: 700, fontFamily: "'Space Mono', monospace", color: cfg.color }}>{days}</p>
                    <p style={{ fontSize: 10, color: "#6A6A75" }}>days</p>
                  </div>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 14, fontWeight: 500 }}>{exam.subject}: {exam.paper}</p>
                    <p style={{ fontSize: 12, color: "#6A6A75", fontFamily: "'Space Mono', monospace" }}>
                      {new Date(exam.date).toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" })} · {exam.time} · {exam.duration}
                    </p>
                    <p style={{ fontSize: 10, color: "#4A4A55" }}>{exam.code} · {cfg.board}</p>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RevisionPlanner));
</script>
</body>
</html>
